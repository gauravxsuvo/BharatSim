services:
  - type: web
    name: bharatsim-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements-lite.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # Any *.vercel.app origin (production + PR previews) is allowed
      # automatically as a fallback, so this only needs updating if you
      # attach a custom domain to the frontend. Comma-separated or a JSON
      # array both work.
      - key: CORS_ORIGINS
        value: "http://localhost:3000"
