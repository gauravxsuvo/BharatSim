# Alembic Configuration File
# BharatSim — AI-Powered Digital Twin of India

[alembic]
# Path to migration scripts.
script_location = alembic

# Prepend the backend directory to sys.path so that app modules resolve.
prepend_sys_path = .

# Database URL — overridden at runtime by env.py from app.config.
sqlalchemy.url = postgresql+asyncpg://bharatsim:bharatsim@localhost:5432/bharatsim

[post_write_hooks]

# ---------- Logging ----------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
